server {
    listen 80;
    listen [::]:80;
    server_name rossdevl.in www.rossdevl.in;

    root /var/www/rossdevl.in;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
